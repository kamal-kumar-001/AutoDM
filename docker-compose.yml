version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: autodm-db
    restart: always
    environment:
      POSTGRES_USER: autodm_user
      POSTGRES_PASSWORD: YourStrongPassword
      POSTGRES_DB: autodm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: autodm-redis
    restart: always
    command: redis-server --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autodm-api
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://autodm_user:YourStrongPassword@postgres:5432/autodm?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecret_change_me_in_production_12345678
      - FRONTEND_URL=https://your-frontend-vercel-domain.vercel.app
      - META_APP_ID=1041091951802618
      - META_APP_SECRET=64425412944431c0e5156ddfa04f47b3
      - META_REDIRECT_URI=https://api.yourdomain.com/instagram/callback
      - META_WEBHOOK_VERIFY_TOKEN=autodm_verify_token_12345
      - ENCRYPTION_KEY=supersecret_encryption_key_change_me_in_production
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  redisdata:
